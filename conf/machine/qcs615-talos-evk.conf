#@TYPE: Machine
#@NAME: Qualcomm QCS615 Talos Evaluation Kit (EVK)
#@DESCRIPTION: Machine configuration for Qualcomm QCS615 Talos Evaluation Kit (EVK)

require conf/machine/include/qcom-qcs615.inc

MACHINE_FEATURES += "efi kvm pci"

KERNEL_DEVICETREE ?= " \
                      qcom/talos-evk.dtb \
                      qcom/talos-evk-camera-imx577.dtbo \
                      qcom/talos-evk-lvds-auo,g133han01.dtbo \
                      "

# These DTs are not upstreamed and currently exist only in linux-qcom kernels
LINUX_QCOM_KERNEL_DEVICETREE ?= " \
                      qcom/talos-evk-camx.dtbo \
                      qcom/talos-el2.dtbo \
                      qcom/talos-staging.dtbo \
                      qcom/talos-evk-staging.dtbo \
                      "

MACHINE_ESSENTIAL_EXTRA_RRECOMMENDS += " \
    packagegroup-qcs615-talos-evk-firmware \
    packagegroup-qcs615-talos-evk-hexagon-dsp-binaries \
    qairt-sdk-hexagon-v66 \
    qps615-dlkm \
"

QCOM_BOOT_FILES_SUBDIR = "qcs615-talos"
QCOM_PARTITION_FILES_SUBDIR ?= "partitions/qcs615-talos-evk/emmc"
QCOM_CDT_FILE = "cdt_sm6150_4.1.0"
QCOM_BOOT_FIRMWARE = "firmware-qcom-boot-qcs615"
QCOM_CDT_FIRMWARE = "firmware-qcom-cdt-qcs615"

# Isolate rt cpu
QCOM_RT_CPU        = "7"
QCOM_IRQAFF        = "0-6"
QCOM_RCU_NOCBS     = "7"
QCOM_RCU_EXPEDITED = "1"
QCOM_CPUIDLE_OFF   = "1"

UBOOT_CONFIG = "qcs615-talos-evk"
