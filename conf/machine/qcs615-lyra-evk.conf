#@TYPE: Machine
#@NAME: Qualcomm QCS615 Lyra Evaluation Kit (EVK)
#@DESCRIPTION: Machine configuration for Qualcomm QCS615 Lyra Evaluation Kit (EVK)

require conf/machine/include/qcom-qcs615.inc

MACHINE_FEATURES += "efi kvm pci"

KERNEL_DEVICETREE ?= " \
                      qcom/talos-lyra-evk.dtb \
                     "

MACHINE_ESSENTIAL_EXTRA_RRECOMMENDS += " \
    packagegroup-qcs615-lyra-evk-firmware \
    packagegroup-qcs615-lyra-evk-hexagon-dsp-binaries \
"

QCOM_BOOT_FILES_SUBDIR = "qcs615"
QCOM_PARTITION_FILES_SUBDIR ?= "partitions/qcs615-lyra-evk/ufs"
QCOM_CDT_FILE = "cdt_sm6150_8.1.0"
QCOM_BOOT_FIRMWARE = "firmware-qcom-boot-qcs615"

# Isolate rt cpu
QCOM_RT_CPU        = "7"
QCOM_IRQAFF        = "0-6"
QCOM_RCU_NOCBS     = "7"
QCOM_RCU_EXPEDITED = "1"
QCOM_CPUIDLE_OFF   = "1"

